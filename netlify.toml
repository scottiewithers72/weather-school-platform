# Weather School Platform - Netlify configuration
# Deploy this repo TWICE as two Netlify sites:
#   Site 1: canesweatherschool.com   -> SCHOOL_ID=canes,       publish sites/canes
#   Site 2: earthsphereacademy.com   -> SCHOOL_ID=earthsphere, publish sites/earthsphere
# Both share the same functions/ backend and the same database.
# Publish directory is set PER-SITE in the Netlify UI
# (Site configuration > Build & deploy > Publish directory).

[build]
  functions = "functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

[[headers]]
  for = "/app/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
