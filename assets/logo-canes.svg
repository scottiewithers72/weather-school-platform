      <stop offset="0" stop-color="#FFD166"/><stop offset="1" stop-color="#FFB627"/>
    </linearGradient>
    <linearGradient id="cloudG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#D9ECFA"/>
