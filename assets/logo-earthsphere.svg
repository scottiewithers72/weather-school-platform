<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 110" role="img" aria-label="EarthSphere Academy">
  <defs>
    <linearGradient id="esG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E9E83"/><stop offset="1" stop-color="#0B3D54"/>
    </linearGradient>
    <linearGradient id="atmG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7FD4F5" stop-opacity=".9"/><stop offset="1" stop-color="#7FD4F5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- emblem: layered sphere — solid earth, ocean band, atmosphere arc -->
  <g transform="translate(55,55)">
    <circle r="40" fill="url(#esG)"/>
    <!-- latitude sweep lines suggesting wind/currents -->
    <path d="M-36 -14 Q0 -28 36 -14" fill="none" stroke="#BDE9DD" stroke-width="3" stroke-linecap="round" opacity=".85"/>
    <path d="M-39 2 Q0 -10 39 2" fill="none" stroke="#9FD9C9" stroke-width="3" stroke-linecap="round" opacity=".7"/>
    <path d="M-34 18 Q0 8 34 18" fill="none" stroke="#7FC8B4" stroke-width="3" stroke-linecap="round" opacity=".55"/>
    <!-- atmosphere arc -->
    <path d="M-48 -8 A48 48 0 0 1 48 -8" fill="none" stroke="url(#atmG)" stroke-width="7" stroke-linecap="round"/>
    <!-- orbiting weather dot -->
    <circle cx="44" cy="-22" r="5" fill="#F2A33C"/>
  </g>
  <!-- wordmark: real type, never AI-generated -->
  <text x="118" y="52" font-family="'Inter','Source Sans 3','Helvetica Neue',sans-serif"
        font-size="38" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#0B3D54">Earth</tspan><tspan fill="#2E9E83">Sphere</tspan>
  </text>
  <text x="120" y="86" font-family="'Inter','Source Sans 3','Helvetica Neue',sans-serif"
        font-size="22" font-weight="600" letter-spacing="6" fill="#41607A">ACADEMY</text>
</svg>
